name: Deploy Scryfall index updater function

on:
    workflow_dispatch:
    push:
        branches:
            - master
        paths:
            - 'tools/generator/scryfall/**'
            - '~github/workflows/deploy-function.yml'
            - 'package.json'
            - 'package-lock.json'

jobs:
    deploy:
        name: Build and deploy
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Bundle function
              run: npm run build:function

            - name: Deploy to Yandex Cloud Functions
              uses: yc-actions/yc-sls-function@v3
              with:
                  yc-sa-json-credentials: ${{ secrets.YC_SA_KEY_JSON }}
                  folder-id: ${{ secrets.YC_FOLDER_ID }}
                  function-name: scryfall-index-updater
                  runtime: nodejs22
                  # Building the full Scryfall all_cards FlexSearch index in memory needs
                  # ~8 GB heap (cf. the update-index script's --max_old_space_size=8192);
                  # 2 GB OOM-killed the runtime (signal 9). NODE_OPTIONS raises the V8
                  # heap so it actually uses the 8 GB container.
                  memory: 8GB
                  entrypoint: index.updater
                  execution-timeout: 600
                  service-account: ${{ secrets.YC_FUNCTION_SA_ID }}
                  environment: |
                      NODE_OPTIONS=--max-old-space-size=7168
                  # AWS-креды S3 — из Lockbox scryfall-index-updater-runtime (SoT, DEK-63),
                  # НЕ из GitHub secrets: копия там протухла после ротации и версии функции
                  # уезжали с невалидной парой ключей (SignatureDoesNotMatch, DEK-193).
                  # При ротации секрета обновить version-id ниже.
                  secrets: |
                      AWS_ACCESS_KEY_ID=e6qqhs3k8tiut6gcrs3a/e6qacnmuh9a3uphslu9g/AWS_ACCESS_KEY_ID
                      AWS_SECRET_ACCESS_KEY=e6qqhs3k8tiut6gcrs3a/e6qacnmuh9a3uphslu9g/AWS_SECRET_ACCESS_KEY
                  source-root: build/function

# One-time manual setup (do NOT automate — these are stateful resources):
#
# 1. Create the function:
#    yc serverless function create --name scryfall-index-updater
#
# 2. Create service account for the function with role storage.uploader on bucket "tuktuk":
#    yc iam service-account create --name scryfall-index-updater-fn
#    yc resource-manager folder add-access-binding --id <FOLDER_ID> \
#      --role storage.uploader --subject serviceAccount:<FN_SA_ID>
#    → save FN_SA_ID into GH secret YC_FUNCTION_SA_ID
#
# 3. Create CI service account with roles functions.admin + iam.serviceAccounts.user:
#    yc iam service-account create --name ci-deployer
#    yc resource-manager folder add-access-binding --id <FOLDER_ID> \
#      --role functions.admin --subject serviceAccount:<CI_SA_ID>
#    yc resource-manager folder add-access-binding --id <FOLDER_ID> \
#      --role iam.serviceAccounts.user --subject serviceAccount:<CI_SA_ID>
#    yc iam key create --service-account-id <CI_SA_ID> -o ci-key.json
#    → paste ci-key.json into GH secret YC_SA_KEY_JSON
#    → save FOLDER_ID into GH secret YC_FOLDER_ID
#
# 4. After the first successful deploy, create the timer trigger:
#    yc serverless trigger create timer \
#      --name update-scryfall-index \
#      --cron-expression '17 4 ? * * *' \
#      --invoke-function-id <FUNCTION_ID> \
#      --invoke-function-service-account-id <FN_SA_ID>
