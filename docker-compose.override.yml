services:
  scg-provider:
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=production
    build:
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-local}

  proxy:
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
    build:
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-local}
